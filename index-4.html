<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#4C3FD4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ambar Ventas">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Ambar · Ventas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --purple: #4C3FD4;
  --purple-l: #EEEDFB;
  --purple-m: #9B92E8;
  --purple-d: #2E2499;
  --purple-soft: #F4F3FE;
  --teal: #0E7A5F;
  --teal-l: #E0F5EE;
  --teal-m: #4DBFA0;
  --red: #D94040;
  --red-l: #FEF0F0;
  --red-d: #9B2B2B;
  --amber: #C47B0A;
  --amber-l: #FEF3DF;
  --amber-m: #F0A830;
  --blue: #1A6BB5;
  --blue-l: #E8F1FB;
  --blue-m: #6FAEE8;
  --gray: #6B6B6B;
  --gray-l: #F5F4F1;
  --gray-ll: #FAFAF8;
  --gray-d: #2A2A2A;
  --white: #FFFFFF;
  --border: rgba(0,0,0,0.08);
  --border-m: rgba(0,0,0,0.12);
  --radius: 14px;
  --radius-sm: 8px;
  --radius-lg: 20px;
  --font: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'DM Mono', monospace;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { touch-action: pan-x pan-y pinch-zoom; }

html, body {
  font-family: var(--font);
  background: var(--gray-ll);
  color: var(--gray-d);
  height: 100%;
  overflow: hidden;
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 430px;
  margin: 0 auto;
  background: var(--gray-ll);
  position: relative;
  overflow: hidden;
}

/* ── HEADER ──────────────────────────────────────── */
.header {
  background: var(--purple);
  padding: calc(var(--safe-top) + 14px) 18px 0;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: -60px; right: -40px;
  width: 160px; height: 160px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
}
.header::after {
  content: '';
  position: absolute;
  bottom: 10px; right: 30px;
  width: 80px; height: 80px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
}
.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  position: relative;
  z-index: 1;
}
.header-greeting { color: rgba(255,255,255,0.6); font-size: 12px; font-weight: 400; margin-bottom: 2px; }
.header-name { color: #fff; font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
.header-date { color: rgba(255,255,255,0.45); font-size: 11px; margin-top: 1px; }
.header-actions { display: flex; gap: 8px; padding-top: 2px; }
.hbtn {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  color: #fff;
  font-family: var(--font);
  font-size: 12px;
  font-weight: 500;
  padding: 7px 13px;
  cursor: pointer;
  transition: background .15s;
  white-space: nowrap;
}
.hbtn:active { background: rgba(255,255,255,0.25); }

.stats-row {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 8px;
  padding: 14px 0 0;
  position: relative;
  z-index: 1;
}
.stat-item {
  background: rgba(255,255,255,0.12);
  border-radius: 10px;
  padding: 9px 8px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.1);
}
.stat-num { color: #fff; font-size: 18px; font-weight: 600; line-height: 1; }
.stat-num.alert { color: #FFCDD2; }
.stat-num.ok { color: #B2F0D4; }
.stat-lbl { color: rgba(255,255,255,0.5); font-size: 9px; margin-top: 3px; font-weight: 400; }

.nav-pills {
  display: flex;
  gap: 0;
  padding: 10px 0 0;
  position: relative;
  z-index: 1;
  border-bottom: none;
  overflow-x: auto;
  scrollbar-width: none;
}
.nav-pills::-webkit-scrollbar { display: none; }
.nav-pill {
  flex-shrink: 0;
  padding: 8px 14px 10px;
  font-family: var(--font);
  font-size: 12px;
  font-weight: 500;
  color: rgba(255,255,255,0.5);
  background: transparent;
  border: none;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .15s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 5px;
}
.nav-pill.active { color: #fff; border-bottom-color: rgba(255,255,255,0.8); }
.nav-pill .badge-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #FFCDD2;
  display: none;
}
.nav-pill .badge-dot.show { display: block; }

/* ── CONTENT ─────────────────────────────────────── */
.content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}
.screen { display: none; padding: 14px 14px 90px; }
.screen.active { display: block; }

/* ── CARDS ───────────────────────────────────────── */
.card {
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  margin-bottom: 10px;
  overflow: hidden;
  transition: transform .1s;
}
.card:active { transform: scale(0.99); }
.card-pad { padding: 14px 16px; }

.section-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--gray);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin: 14px 0 8px;
}

/* ── CONTACT CARD ─────────────────────────────────── */
.ccard {
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  margin-bottom: 10px;
  overflow: hidden;
}
.ccard-stripe { height: 3px; }
.ccard-body { padding: 13px 15px; }
.ccard-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
.ccard-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.avatar {
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600;
  flex-shrink: 0;
}
.ccard-info { flex: 1; min-width: 0; }
.ccard-name { font-size: 14px; font-weight: 600; color: var(--gray-d); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ccard-meta { font-size: 11px; color: var(--gray); margin-top: 1px; }
.ccard-note {
  font-size: 11px; color: #555;
  background: var(--gray-l);
  border-radius: var(--radius-sm);
  padding: 7px 10px;
  margin: 8px 0;
  line-height: 1.5;
  font-style: italic;
}
.ccard-actions { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 9px; }

/* ── BADGE ───────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 600;
  padding: 4px 9px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
}
.badge .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.b-red { background: var(--red-l); color: var(--red-d); }
.b-red .dot { background: var(--red); }
.b-amber { background: var(--amber-l); color: #7A4A05; }
.b-amber .dot { background: var(--amber-m); }
.b-green { background: var(--teal-l); color: var(--teal); }
.b-green .dot { background: var(--teal-m); }
.b-blue { background: var(--blue-l); color: var(--blue); }
.b-blue .dot { background: var(--blue-m); }
.b-purple { background: var(--purple-l); color: var(--purple-d); }
.b-gray { background: var(--gray-l); color: var(--gray); }

/* ── BUTTONS ─────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  font-family: var(--font);
  font-size: 12px; font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border-m);
  background: var(--white);
  color: var(--gray-d);
  transition: all .12s;
  white-space: nowrap;
  min-height: 36px;
}
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--purple); color: var(--white); border-color: var(--purple); }
.btn-primary:active { background: var(--purple-d); }
.btn-teal { background: var(--teal); color: var(--white); border-color: var(--teal); }
.btn-danger { color: var(--red-d); border-color: #F5B5B5; background: var(--red-l); }
.btn-ghost { background: var(--gray-ll); border-color: var(--border); color: var(--gray); }
.btn-sm { padding: 6px 11px; font-size: 11px; min-height: 30px; }
.btn-full { width: 100%; }
.btn-icon { gap: 6px; }

/* ── MOTO CARD ───────────────────────────────────── */
.moto-card {
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 14px 15px;
  margin-bottom: 10px;
}
.moto-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
.moto-brand { font-size: 10px; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: .06em; }
.moto-model { font-size: 16px; font-weight: 600; color: var(--gray-d); margin: 1px 0 5px; }
.moto-price { font-size: 17px; font-weight: 600; color: var(--purple); }
.moto-cuota { font-size: 11px; color: var(--gray); margin-top: 1px; }
.moto-specs { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0; }
.spec-chip { font-size: 10px; font-weight: 500; background: var(--gray-l); color: var(--gray-d); padding: 4px 9px; border-radius: 20px; }
.cdots { display: flex; gap: 5px; align-items: center; margin: 6px 0; }
.cdot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid rgba(0,0,0,.1); flex-shrink: 0; }
.cdot-label { font-size: 10px; color: var(--gray); margin-left: 2px; }
.stock-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.stock-ok { color: var(--teal); font-size: 12px; font-weight: 600; }
.stock-low { color: var(--amber); font-size: 12px; font-weight: 600; }
.stock-out { color: var(--red); font-size: 12px; font-weight: 600; }
.stock-btns { display: flex; gap: 6px; }

/* ── TIP CARD ────────────────────────────────────── */
.tip-card {
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  border-left: 3px solid var(--purple);
  padding: 13px 15px;
  margin-bottom: 9px;
}
.tip-text { font-size: 13px; color: #444; line-height: 1.6; font-style: italic; margin-top: 6px; }

/* ── FORMS & MODAL ───────────────────────────────── */
.sheet-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 100;
  display: none;
  align-items: flex-end;
  animation: fadeIn .2s;
}
.sheet-overlay.open { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.sheet {
  background: var(--white);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: 0 18px calc(var(--safe-bottom) + 20px);
  width: 100%;
  max-height: 90dvh;
  overflow-y: auto;
  animation: slideUp .25s cubic-bezier(.2,.8,.4,1);
}
@keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: none; opacity: 1; } }

.sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border-m); margin: 14px auto 16px; }
.sheet-title { font-size: 17px; font-weight: 600; color: var(--gray-d); margin-bottom: 18px; }

.field { margin-bottom: 13px; }
.field label { display: block; font-size: 11px; font-weight: 600; color: var(--gray); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }
.field input, .field select, .field textarea {
  width: 100%; padding: 11px 13px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border-m);
  background: var(--gray-ll);
  font-family: var(--font);
  font-size: 15px;
  color: var(--gray-d);
  outline: none;
  transition: border-color .15s;
  -webkit-appearance: none;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--purple);
  background: var(--white);
}
.field textarea { min-height: 80px; resize: vertical; line-height: 1.55; }
.two-col { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
.sheet-footer { display: flex; gap: 10px; padding-top: 14px; border-top: 1px solid var(--border); margin-top: 6px; }
.sheet-footer .btn { flex: 1; min-height: 48px; font-size: 14px; border-radius: var(--radius-sm); }

/* ── SEARCH & FILTER ──────────────────────────────── */
.search-wrap { position: relative; margin-bottom: 12px; }
.search-wrap input { width: 100%; padding: 11px 14px 11px 38px; border-radius: var(--radius-sm); border: 1.5px solid var(--border-m); background: var(--white); font-family: var(--font); font-size: 14px; color: var(--gray-d); outline: none; }
.search-wrap input:focus { border-color: var(--purple); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--gray); width: 16px; height: 16px; }
.filter-scroll { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 12px; scrollbar-width: none; }
.filter-scroll::-webkit-scrollbar { display: none; }
.fchip {
  flex-shrink: 0; font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 20px;
  border: 1.5px solid var(--border-m); cursor: pointer; background: var(--white); color: var(--gray);
  white-space: nowrap; transition: all .12s;
}
.fchip.on { background: var(--purple-l); color: var(--purple-d); border-color: var(--purple-m); }

/* ── TOAST ───────────────────────────────────────── */
.toast-wrap {
  position: fixed; bottom: calc(var(--safe-bottom) + 14px); left: 50%;
  transform: translateX(-50%);
  z-index: 200; width: calc(100% - 28px); max-width: 400px;
  pointer-events: none;
}
.toast {
  background: var(--gray-d); color: var(--white);
  font-size: 13px; font-weight: 500;
  padding: 13px 18px; border-radius: 12px;
  text-align: center; opacity: 0;
  transition: opacity .25s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
}
.toast.show { opacity: 1; }

/* ── MSG BUBBLE ──────────────────────────────────── */
.msg-preview {
  background: var(--blue-l);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-size: 13px; line-height: 1.7;
  color: #1A3D6B;
  border: 1px solid rgba(26,107,181,.15);
  white-space: pre-line;
  font-family: var(--font);
}

/* ── VENTA MINI CARD ─────────────────────────────── */
.venta-card {
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 12px 15px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.venta-card-left { flex: 1; min-width: 0; }
.venta-name { font-size: 13px; font-weight: 600; color: var(--gray-d); }
.venta-detail { font-size: 11px; color: var(--gray); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── EMPTY STATE ─────────────────────────────────── */
.empty { padding: 50px 20px; text-align: center; color: var(--gray); }
.empty-icon { font-size: 36px; margin-bottom: 10px; }
.empty-text { font-size: 14px; }

/* ── MSG SHEET TEXTAREA ───────────────────────────── */
#msg-txt { min-height: 140px; font-size: 14px; line-height: 1.65; }

/* ── SCROLL INSIDE CONTENT ───────────────────────── */
.content::-webkit-scrollbar { width: 3px; }
.content::-webkit-scrollbar-thumb { background: var(--border-m); border-radius: 3px; }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div style="display:flex;align-items:center;gap:12px">
        <div id="header-avatar" onclick="goScreen('perfil', document.querySelector('.nav-pill.active') || document.querySelector('.nav-pill'))" style="width:44px;height:44px;border-radius:50%;border:2.5px solid rgba(255,255,255,0.4);overflow:hidden;cursor:pointer;flex-shrink:0;background:rgba(255,255,255,0.15) center/cover no-repeat;display:flex;align-items:center;justify-content:center">
          <svg id="header-avatar-icon" width="22" height="22" viewBox="0 0 24 24" fill="rgba(255,255,255,0.8)"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
        </div>
        <div>
          <div class="header-greeting" id="hgreeting">Buen dia</div>
          <div class="header-name" id="header-name">Mi nombre</div>
          <div id="header-empresa" style="color:rgba(255,255,255,0.5);font-size:10px;margin-top:1px;display:none"></div>
          <div class="header-date" id="hdate"></div>
        </div>
      </div>
      <div class="header-actions">
        <button class="hbtn" onclick="openSheet('sh-cliente')">+ Cliente</button>
        <button class="hbtn" onclick="openSheet('sh-venta')">+ Venta</button>
      </div>
    </div>
    <div class="stats-row" id="stats-row"></div>
    <div class="nav-pills">
      <button class="nav-pill active" onclick="goScreen('inicio',this)">
        <svg width="13" height="13" viewBox="0 0 20 20" fill="currentColor"><path d="M10.707 1.293a1 1 0 00-1.414 0l-7 7A1 1 0 003 10h1v7a1 1 0 001 1h4v-5h2v5h4a1 1 0 001-1v-7h1a1 1 0 00.707-1.707l-7-7z"/></svg>
        Inicio
        <span class="badge-dot" id="bdot-inicio"></span>
      </button>
      <button class="nav-pill" onclick="goScreen('seguimiento',this)">
        <svg width="13" height="13" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/></svg>
        Seguimiento
        <span class="badge-dot" id="bdot-seguimiento"></span>
      </button>
      <button class="nav-pill" onclick="goScreen('prospectos',this)">
        <svg width="13" height="13" viewBox="0 0 20 20" fill="currentColor"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/></svg>
        Prospectos
      </button>
      <button class="nav-pill" onclick="goScreen('stock',this)">
        <svg width="13" height="13" viewBox="0 0 20 20" fill="currentColor"><path d="M4 3a2 2 0 100 4h12a2 2 0 100-4H4zM3 8h14v7a2 2 0 01-2 2H5a2 2 0 01-2-2V8zm5 3a1 1 0 011-1h2a1 1 0 110 2h-2a1 1 0 01-1-1z"/></svg>
        Stock
      </button>
      <button class="nav-pill" onclick="goScreen('comisiones',this)">
        <svg width="13" height="13" viewBox="0 0 20 20" fill="currentColor"><path d="M8.433 7.418c.155-.103.346-.196.567-.267v1.698a2.305 2.305 0 01-.567-.267C8.07 8.34 8 8.114 8 8c0-.114.07-.34.433-.582zM11 12.849v-1.698c.22.071.412.164.567.267.364.243.433.468.433.582 0 .114-.07.34-.433.582a2.305 2.305 0 01-.567.267z"/><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-13a1 1 0 10-2 0v.092a4.535 4.535 0 00-1.676.662C6.602 6.234 6 7.009 6 8c0 .99.602 1.765 1.324 2.246.48.32 1.054.545 1.676.662v1.941c-.391-.127-.68-.317-.843-.504a1 1 0 10-1.51 1.31c.562.649 1.413 1.076 2.353 1.253V15a1 1 0 102 0v-.092a4.535 4.535 0 001.676-.662C13.398 13.766 14 12.991 14 12c0-.99-.602-1.765-1.324-2.246A4.535 4.535 0 0011 9.092V7.151c.391.127.68.317.843.504a1 1 0 101.511-1.31c-.563-.649-1.413-1.076-2.354-1.253V5z" clip-rule="evenodd"/></svg>
        Ventas & Comisiones
      </button>
      <button class="nav-pill" onclick="goScreen('tips',this)">
        <svg width="13" height="13" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/></svg>
        Tips
      </button>
      <button class="nav-pill" onclick="goScreen('ia',this)">
        <svg width="13" height="13" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
        Asistente IA
      </button>
      <button class="nav-pill" onclick="goScreen('perfil',this)">
        <svg width="13" height="13" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
        Perfil
      </button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- INICIO -->
    <div id="sc-inicio" class="screen active">
      <div class="section-label">Alertas del dia</div>
      <div id="alertas-list"></div>
      <div class="section-label">Ultimas ventas</div>
      <div id="ventas-list"></div>
    </div>

    <!-- SEGUIMIENTO -->
    <div id="sc-seguimiento" class="screen">
      <div class="filter-scroll">
        <div class="fchip on" onclick="segFilter(this,'todos')">Todos</div>
        <div class="fchip" onclick="segFilter(this,'rojo')">Urgente</div>
        <div class="fchip" onclick="segFilter(this,'naranja')">Esta semana</div>
        <div class="fchip" onclick="segFilter(this,'verde')">Al dia</div>
        <div class="fchip" onclick="segFilter(this,'azul')">Post-venta</div>
      </div>
      <div id="seg-list"></div>
    </div>

    <!-- PROSPECTOS -->
    <div id="sc-prospectos" class="screen">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
        <input id="psearch" placeholder="Buscar por nombre o moto..." oninput="renderProspectos()">
      </div>
      <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
        <button class="btn btn-primary btn-icon" onclick="openSheet('sh-cliente')">
          <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>
          Agregar prospecto
        </button>
      </div>
      <div id="prosp-list"></div>
    </div>

    <!-- CATALOGO (antes Stock) -->
    <div id="sc-stock" class="screen">
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <div class="search-wrap" style="flex:1;margin-bottom:0">
          <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
          <input id="cat-search" placeholder="Buscar moto..." oninput="renderStock()">
        </div>
        <button class="btn btn-primary" onclick="openSheet('sh-moto')" style="flex-shrink:0;padding:0 14px">+</button>
      </div>
      <div class="filter-scroll" id="cat-filters">
        <div class="fchip on" onclick="catFilter(this,'todas')">Todas</div>
        <div class="fchip" onclick="catFilter(this,'con-stock')">Con stock</div>
        <div class="fchip" onclick="catFilter(this,'sin-stock')">Sin stock</div>
      </div>
      <div id="stock-list"></div>
    </div>

    <!-- COMISIONES -->
    <div id="sc-comisiones" class="screen">
      <div id="com-content"></div>
    </div>

    <!-- ASISTENTE IA -->
    <div id="sc-ia" class="screen">
      <div id="ia-content"></div>
    </div>

    <!-- PERFIL -->
    <div id="sc-perfil" class="screen">
      <div id="perfil-content"></div>
    </div>

    <!-- TIPS -->
    <div id="sc-tips" class="screen">
      <div id="tips-list"></div>
    </div>

  </div>
</div>

<!-- TOAST -->
<div class="toast-wrap"><div class="toast" id="toast"></div></div>

<!-- SHEET: CLIENTE -->
<div class="sheet-overlay" id="sh-cliente" onclick="if(event.target===this)closeSheet('sh-cliente')">
<div class="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Nuevo prospecto</div>
  <div class="two-col">
    <div class="field"><label>Nombre *</label><input id="cn" placeholder="Sofia Lopez" autocomplete="name"></div>
    <div class="field"><label>Telefono *</label><input id="ct" type="tel" placeholder="11 5544 3322" autocomplete="tel"></div>
  </div>
  <div class="two-col">
    <div class="field"><label>Tipo de cliente</label><select id="cti">
      <option>Primerizo</option><option>Comparador</option><option>Curioso</option>
      <option>Pareja/familia</option><option>Ya decidido</option><option>Precio primero</option><option>Mujer compradora</option>
    </select></div>
    <div class="field"><label>Moto de interes</label><select id="cmi"></select></div>
  </div>
  <div class="field"><label>Prioridad</label><select id="cpr">
    <option value="alta">Alta — contactar hoy</option>
    <option value="media" selected>Media — esta semana</option>
    <option value="baja">Baja — seguimiento suave</option>
  </select></div>
  <div class="field"><label>Notas de la visita</label><textarea id="cno" placeholder="Quiere color rojo, paga en cuotas, vuelve con su pareja..."></textarea></div>
  <div class="sheet-footer">
    <button class="btn" onclick="closeSheet('sh-cliente')">Cancelar</button>
    <button class="btn btn-primary" onclick="saveCliente()">Guardar</button>
  </div>
</div></div>

<!-- SHEET: VENTA -->
<div class="sheet-overlay" id="sh-venta" onclick="if(event.target===this)closeSheet('sh-venta')">
<div class="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Registrar venta</div>
  <div class="field"><label>Cliente</label><select id="vc"></select></div>
  <div class="two-col">
    <div class="field"><label>Moto vendida *</label><select id="vm"></select></div>
    <div class="field"><label>Color</label><input id="vcol" placeholder="Rojo"></div>
  </div>
  <div class="two-col">
    <div class="field"><label>Precio final ($)</label><input id="vpr" type="number" inputmode="numeric" placeholder="480000"></div>
    <div class="field"><label>Forma de pago</label><select id="vpago">
      <option>Contado</option><option>Cuotas x12</option><option>Cuotas x18</option><option>Cuotas x24</option>
    </select></div>
  </div>
  <div class="field"><label>Notas</label><textarea id="vno" placeholder="Casco incluido, primer service gratis..."></textarea></div>
  <div class="sheet-footer">
    <button class="btn" onclick="closeSheet('sh-venta')">Cancelar</button>
    <button class="btn btn-primary" onclick="saveVenta()">Registrar venta</button>
  </div>
</div></div>

<!-- SHEET: MOTO -->
<div class="sheet-overlay" id="sh-moto" onclick="if(event.target===this)closeSheet('sh-moto')">
<div class="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sh-moto-title">Nueva moto al catalogo</div>
  <div class="field">
    <label>Foto de la moto</label>
    <div id="foto-preview" style="width:100%;height:150px;border-radius:10px;background:var(--gray-l);border:2px dashed var(--border-m);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative" onclick="el('foto-input').click()">
      <img id="foto-img" src="" style="width:100%;height:100%;object-fit:cover;display:none;border-radius:8px">
      <div id="foto-placeholder" style="text-align:center;padding:12px">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--gray);margin-bottom:5px;display:block;margin-left:auto;margin-right:auto"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <div style="font-size:12px;color:var(--gray)">Tocar para subir foto</div>
      </div>
    </div>
    <input type="file" id="foto-input" accept="image/*" style="display:none" onchange="handleFotoFile(this)">
    <input id="foto-url" placeholder="O pegar URL de foto de internet" style="margin-top:8px;width:100%;font-size:13px;padding:9px 12px;border-radius:10px;border:1.5px solid var(--border-m);background:var(--gray-ll);color:var(--gray-d);font-family:var(--font)" oninput="handleFotoUrl(this.value)">
  </div>
  <div class="two-col">
    <div class="field"><label>Marca *</label><input id="mm" placeholder="Honda"></div>
    <div class="field"><label>Modelo *</label><input id="mmo" placeholder="CB 190R"></div>
  </div>
  <div class="two-col">
    <div class="field"><label>Precio lista ($)</label><input id="mpr" type="number" inputmode="numeric" placeholder="480000"></div>
    <div class="field"><label>Cuota 12m ($)</label><input id="mcu" type="number" inputmode="numeric" placeholder="52000"></div>
  </div>
  <div class="two-col">
    <div class="field"><label>Cilindrada</label><input id="mcc" placeholder="190cc"></div>
    <div class="field"><label>Consumo (km/l)</label><input id="mcon" placeholder="38"></div>
  </div>
  <div class="two-col">
    <div class="field"><label>Potencia (HP)</label><input id="mhp" placeholder="17"></div>
    <div class="field"><label>Peso (kg)</label><input id="mpeso" placeholder="138"></div>
  </div>
  <div class="field"><label>Colores (separar con coma)</label><input id="mcol" placeholder="Rojo, Negro, Blanco"></div>
  <div class="two-col">
    <div class="field"><label>Stock</label><input id="mst" type="number" inputmode="numeric" placeholder="3"></div>
    <div class="field"><label>Perfil ideal</label><select id="mperf">
      <option>Primerizo/a</option><option>Uso diario ciudad</option><option>Fin de semana</option>
      <option>Deportivo</option><option>Economico</option><option>Largo alcance</option>
    </select></div>
  </div>
  <div class="field"><label>Argumento de venta</label><textarea id="mdesc" placeholder="Ideal para uso diario, bajo consumo, facil mantenimiento..."></textarea></div>
  <input type="hidden" id="moto-edit-id" value="">
  <div class="sheet-footer">
    <button class="btn" onclick="closeSheet('sh-moto');resetMotoForm()">Cancelar</button>
    <button class="btn btn-primary" onclick="saveMoto()">Guardar</button>
  </div>
</div></div>

<!-- SHEET: MENSAJE -->
<div class="sheet-overlay" id="sh-msg" onclick="if(event.target===this)closeSheet('sh-msg')">
<div class="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="msg-title">Mensaje listo</div>
  <div class="field"><label>Edita si queres y copialo</label>
  <textarea id="msg-txt"></textarea></div>
  <div class="sheet-footer">
    <button class="btn" onclick="closeSheet('sh-msg')">Cerrar</button>
    <button class="btn btn-teal" onclick="copyMsg()">Copiar mensaje</button>
  </div>
</div></div>

<!-- SHEET: CONFIG COMISIONES -->
<div class="sheet-overlay" id="sh-comconfig" onclick="if(event.target===this)closeSheet('sh-comconfig')">
<div class="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Configurar sistema de comisiones</div>
  <div class="field"><label>Tipo de comision</label><select id="com-tipo" onchange="toggleComFields()">
    <option value="porcentaje">Porcentaje del precio de venta</option>
    <option value="fijo">Monto fijo por moto vendida</option>
  </select></div>
  <div id="com-field-pct" class="field"><label>Porcentaje (%)</label><input id="com-pct" type="number" inputmode="decimal" placeholder="3" step="0.1"></div>
  <div id="com-field-fijo" class="field" style="display:none"><label>Monto fijo por venta ($)</label><input id="com-fijo" type="number" inputmode="numeric" placeholder="15000"></div>
  <div class="field"><label>Notas (opcional)</label><input id="com-notas" placeholder="Ej: Se cobra los 15 de cada mes"></div>
  <div class="sheet-footer">
    <button class="btn" onclick="closeSheet('sh-comconfig')">Cancelar</button>
    <button class="btn btn-primary" onclick="saveComConfig()">Guardar</button>
  </div>
</div></div>

<script src="app.js"></script>
</body>
</html>
